<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduHub — Вход</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0f0f0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 40px 36px 32px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1.5px solid #e8e8e8;
    }

    .logo-wrap {
      width: 60px;
      height: 60px;
      background: #efefef;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }

    .logo-wrap svg {
      width: 30px;
      height: 30px;
      color: #222;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 13.5px;
      color: #777;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .input-group {
      width: 100%;
      position: relative;
      margin-bottom: 12px;
    }

    .input-group svg {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: #aaa;
      pointer-events: none;
    }

    .input-group input {
      width: 100%;
      padding: 11px 14px 11px 38px;
      border: 1.5px solid #e0e0e0;
      border-radius: 9px;
      font-size: 14px;
      color: #222;
      outline: none;
      background: #fff;
      transition: border-color 0.2s;
    }

    .input-group input::placeholder {
      color: #bbb;
    }

    .input-group input:focus {
      border-color: #111;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.2px;
      transition: background 0.18s, transform 0.12s;
    }

    .btn-login:hover {
      background: #333;
    }

    .btn-login:active {
      transform: scale(0.98);
    }

    .footer-note {
      margin-top: 22px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
      line-height: 1.5;
      border-top: 1px solid #f0f0f0;
      padding-top: 16px;
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- Logo -->
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
        <path d="M6 12v5c3.33 2 8.67 2 12 0v-5"/>
      </svg>
    </div>

    <div class="title">EduHub</div>
    <div class="subtitle">Платформа для студентов и преподавателей<br>института</div>

    <!-- Login field -->
    <div class="input-group">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <input type="text" id="login" placeholder="Логин" autocomplete="username" />
    </div>

    <!-- Password field -->
    <div class="input-group">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input type="password" id="password" placeholder="Пароль" autocomplete="current-password" />
    </div>

    <button class="btn-login" id="loginBtn">Войти</button>

    <div class="footer-note">
      Если у вас нет учетных данных, обратитесь к администратору.
    </div>
  </div>

  <script>
      async function handleLogin() {
          const login = document.getElementById('login').value.trim();
          const password = document.getElementById('password').value.trim();

          if (!login || !password) {
              showMessage('Пожалуйста, введите логин и пароль.', 'error');
              return;
          }

          try {
              const response = await fetch('http://localhost:5052/api/auth/login', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ Login: login, Password: password })
              });

              const data = await response.json();

              if (response.ok) {
                  localStorage.setItem('userRole', data.role);
                  localStorage.setItem('userName', data.name);
                  localStorage.setItem('userSurname', data.surname);
                  localStorage.setItem('userId', data.id);
                  localStorage.setItem('token', data.token);
                  localStorage.setItem('loginTime', Date.now());
                  showMessage(data.message, 'success');
                  setTimeout(() => {
                      window.location.href = 'dashboard.html';
                  }, 800);
              } else {
                  showMessage(data.message || 'Неверный логин или пароль', 'error');
              }
          } catch (e) {
              showMessage('Ошибка подключения к серверу', 'error');
          }
      }

      function showMessage(text, type) {
          const existing = document.getElementById('toast');
          if (existing) existing.remove();

          const toast = document.createElement('div');
          toast.id = 'toast';
          toast.textContent = text;
          toast.style.cssText = `
              position: fixed;
              top: 24px;
              left: 50%;
              transform: translateX(-50%);
              padding: 14px 28px;
              border-radius: 10px;
              font-size: 14px;
              font-weight: 600;
              color: #fff;
              background: ${type === "success" ? "#2d8a4e" : "#c0392b"};
              box-shadow: 0 4px 20px rgba(0,0,0,0.15);
              z-index: 9999;
              transition: opacity 0.4s;
          `;
          document.body.appendChild(toast);

          setTimeout(() => {
              toast.style.opacity = '0';
              setTimeout(() => toast.remove(), 400);
          }, 3000);
      }

      document.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') handleLogin();
      });
      document.getElementById('loginBtn').addEventListener('click', handleLogin);
  </script>

</body>
</html>
